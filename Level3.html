<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waltz's Trial - Level 3</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <script src="gameManager.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: "Patrick Hand", cursive;
        color: #eee;
      }

      .top-back {
        position: fixed;
        top: 24px;
        left: 30px;
        z-index: 5;
        color: #aaa;
        font-size: 1.55rem;
        text-decoration: none;
        transition: 0.2s ease;
      }
      .top-back:hover {
        color: #fff;
        transform: translateX(-4px);
      }

      .page {
        width: min(1060px, 92vw);
        min-height: 640px;
        display: none;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.55s ease both;
      }
      .page.active {
        display: flex;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .theme-ai {
        --theme-color: #39ff14;
        --theme-glow: rgba(57, 255, 20, 0.38);
        --theme-bg: rgba(57, 255, 20, 0.055);
        --theme-soft: rgba(57, 255, 20, 0.15);
      }
      .theme-jail {
        --theme-color: #ffaa00;
        --theme-glow: rgba(255, 170, 0, 0.42);
        --theme-bg: rgba(255, 170, 0, 0.06);
        --theme-soft: rgba(255, 170, 0, 0.16);
      }

      .panel {
        width: 100%;
        min-height: 560px;
        border-radius: 30px;
        border: 1px solid var(--theme-color);
        background: var(--theme-bg);
        box-shadow: 0 16px 50px var(--theme-glow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 44px;
        text-align: center;
        transition: 0.55s ease;
      }

      .coin-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .title {
        font-size: clamp(2.7rem, 6vw, 4.5rem);
        color: var(--theme-color);
        text-shadow: 0 0 16px var(--theme-glow);
        margin-bottom: 12px;
        letter-spacing: 1px;
      }

      .subtitle {
        color: #cfcfcf;
        font-size: 1.55rem;
        margin-bottom: 42px;
      }

      .coin-scene {
        width: 260px;
        height: 260px;
        perspective: 900px;
        margin-bottom: 34px;
        cursor: pointer;
      }

      .coin {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1.7s cubic-bezier(0.32, 1.85, 0.42, 1);
      }
      .coin.flip-ai {
        transform: rotateY(1800deg);
      }
      .coin.flip-jail {
        transform: rotateY(1980deg);
      }

      .coin-face {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        font-size: 4.8rem;
        border: 5px dashed;
        user-select: none;
      }
      .coin-front {
        color: #39ff14;
        border-color: #39ff14;
        background: rgba(57, 255, 20, 0.1);
        box-shadow:
          inset 0 0 36px rgba(57, 255, 20, 0.58),
          0 0 40px rgba(57, 255, 20, 0.26);
        text-shadow: 0 0 18px rgba(57, 255, 20, 0.95);
      }
      .coin-back {
        color: #ffaa00;
        border-color: #ffaa00;
        background: rgba(255, 170, 0, 0.1);
        box-shadow:
          inset 0 0 36px rgba(255, 170, 0, 0.58),
          0 0 40px rgba(255, 170, 0, 0.26);
        text-shadow: 0 0 18px rgba(255, 170, 0, 0.95);
        transform: rotateY(180deg);
      }

      .primary-btn,
      .answer-btn {
        font-family: "Patrick Hand", cursive;
        border-radius: 14px;
        border: 1px solid var(--theme-color);
        background: rgba(0, 0, 0, 0.36);
        color: #fff;
        cursor: pointer;
        transition: 0.24s ease;
      }
      .primary-btn {
        font-size: 1.65rem;
        padding: 13px 38px;
      }
      .primary-btn:hover,
      .answer-btn:hover {
        background: var(--theme-color);
        color: #101014;
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 10px 28px var(--theme-glow);
      }
      .primary-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .narrative-text {
        max-width: 780px;
        margin: 28px auto 40px;
        font-size: clamp(1.75rem, 3vw, 2.35rem);
        line-height: 1.35;
        color: #eee;
      }

      .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 28px;
        color: var(--theme-color);
        font-size: 1.55rem;
      }

      .progress-text {
        opacity: 0.95;
      }

      .question {
        min-height: 115px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--theme-color);
        text-shadow: 0 0 13px var(--theme-glow);
        font-size: clamp(2rem, 4vw, 2.65rem);
        line-height: 1.2;
        margin-bottom: 28px;
      }

      .answers {
        width: min(780px, 100%);
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .answer-btn {
        padding: 17px 28px;
        font-size: 1.75rem;
        text-align: left;
      }

      .message {
        min-height: 38px;
        margin-top: 24px;
        font-size: 1.6rem;
        color: #ddd;
      }
    </style>
  </head>

  <body>
    <a href="MenuTest.html" class="top-back">← Back</a>

    <main id="coinPage" class="page active">
      <section id="coinPanel" class="panel coin-panel theme-ai">
        <h1 class="title">Level 3: Fate Flip</h1>
        <p class="subtitle">A single coin decides which trial you face.</p>

        <div class="coin-scene" id="coinScene" aria-label="Flip coin">
          <div class="coin" id="coin">
            <div class="coin-face coin-front">AI</div>
            <div class="coin-face coin-back">JAIL</div>
          </div>
        </div>

        <button id="flipBtn" class="primary-btn">Flip Coin</button>
      </section>
    </main>

    <main id="narrativePage" class="page">
      <section id="narrativePanel" class="panel theme-ai">
        <h1 id="resultTitle" class="title">Result</h1>
        <p id="resultNarrative" class="narrative-text"></p>
        <button id="continueBtn" class="primary-btn">Continue to Trial</button>
      </section>
    </main>

    <main id="quizPage" class="page">
      <section id="quizPanel" class="panel theme-ai">
        <div class="quiz-header">
          <span class="progress-text" id="questionProgress"
            >Question 1 / 3</span
          >
          <span id="timer">Time: 75</span>
        </div>

        <h2 id="questionText" class="question"></h2>
        <div id="answers" class="answers"></div>
        <p id="message" class="message"></p>
      </section>
    </main>

    <script>
      const LEVEL_NUMBER = 3;
      const START_TIME = 75;

      const trials = {
        ai: {
          themeClass: "theme-ai",
          coinClass: "flip-ai",
          title: "AI BREACH CONTROL",
          narrative:
            "You awaken inside a corrupted system core. Firewalls pulse red. A rogue AI has sealed all exits. Override the security nodes or be deleted.",
          warning:
            "⚠ System integrity failing... another error and deletion is imminent.",
          questions: [
            {
              text: "To bypass the firewall, find the correct array index for the third security node.",
              options: ["node[3]", "node[2]", "node.index(3)"],
              answer: "node[2]",
            },
            {
              text: "The system is stuck in an infinite loop. Which command forces termination?",
              options: ["break;", "continue;", "return null;"],
              answer: "break;",
            },
            {
              text: "Binary gate: 1010. What is the decimal value?",
              options: ["12", "8", "10"],
              answer: "10",
            },
          ],
        },
        jail: {
          themeClass: "theme-jail",
          coinClass: "flip-jail",
          title: "PRISON BREAK",
          narrative:
            "You woke up with a severe headache. Iron bars surround you. Sirens echo in the distance. You must form a plan before guards arrive.",
          warning:
            "⚠ Footsteps approach... one more mistake and you're caught.",
          questions: [
            {
              text: "Which material is safest as an insulator?",
              options: [
                "A damp towel",
                "A dry rubber boot",
                "A metal coat hanger",
              ],
              answer: "A dry rubber boot",
            },
            {
              text: "Which mix causes a fizzing reaction?",
              options: [
                "Vinegar and Baking Soda",
                "Water and Soap",
                "Bleach and Oil",
              ],
              answer: "Vinegar and Baking Soda",
            },
            {
              text: "To lift with least effort, where pull rope?",
              options: [
                "45-degree angle",
                "Straight down from highest point",
                "Horizontally",
              ],
              answer: "Straight down from highest point",
            },
          ],
        },
      };
      let selectedTheme = null;
      let currentQuestionIndex = 0;
      let correctAnswers = 0;
      let mistakes = 0;
      let timeLeft = START_TIME;
      let timerInterval = null;
      let locked = false;

      const coinPage = document.getElementById("coinPage");
      const narrativePage = document.getElementById("narrativePage");
      const quizPage = document.getElementById("quizPage");
      const coinPanel = document.getElementById("coinPanel");
      const narrativePanel = document.getElementById("narrativePanel");
      const quizPanel = document.getElementById("quizPanel");
      const coin = document.getElementById("coin");
      const coinScene = document.getElementById("coinScene");
      const flipBtn = document.getElementById("flipBtn");
      const continueBtn = document.getElementById("continueBtn");
      const resultTitle = document.getElementById("resultTitle");
      const resultNarrative = document.getElementById("resultNarrative");
      const questionProgress = document.getElementById("questionProgress");
      const questionText = document.getElementById("questionText");
      const answers = document.getElementById("answers");
      const timer = document.getElementById("timer");
      const message = document.getElementById("message");

      function showPage(page) {
        [coinPage, narrativePage, quizPage].forEach((p) =>
          p.classList.remove("active"),
        );
        page.classList.add("active");
      }

      function setTheme(panel, themeKey) {
        panel.classList.remove("theme-ai", "theme-jail");
        panel.classList.add(trials[themeKey].themeClass);
      }

      function flipCoin() {
        if (locked) return;
        GameManager.playSfx("coin");
        locked = true;
        flipBtn.disabled = true;

        selectedTheme = Math.random() < 0.5 ? "ai" : "jail";
        const trial = trials[selectedTheme];

        coin.classList.remove("flip-ai", "flip-jail");
        void coin.offsetWidth;
        coin.classList.add(trial.coinClass);

        setTimeout(() => {
          setTheme(narrativePanel, selectedTheme);
          resultTitle.textContent = trial.title;
          resultNarrative.textContent = trial.narrative;
          showPage(narrativePage);
        }, 1850);
      }

      function startQuiz() {
        setTheme(quizPanel, selectedTheme);
        showPage(quizPage);
        renderQuestion();
        startTimer();
      }

      function renderQuestion() {
        const trial = trials[selectedTheme];
        const question = trial.questions[currentQuestionIndex];

        questionProgress.textContent = `Question ${currentQuestionIndex + 1} / ${trial.questions.length}`;
        questionText.textContent = question.text;
        message.textContent = "";
        answers.innerHTML = "";

        question.options.forEach((option) => {
          const button = document.createElement("button");
          button.className = "answer-btn";
          button.textContent = option;
          button.onclick = () => checkAnswer(option);
          answers.appendChild(button);
        });
      }

      function startTimer() {
        timer.textContent = `Time: ${timeLeft}`;
        timerInterval = setInterval(() => {
          timeLeft--;
          timer.textContent = `Time: ${timeLeft}`;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            failLevel("Time is up.");
          }
        }, 1000);
      }

      function checkAnswer(selected) {
        const trial = trials[selectedTheme];
        const question = trial.questions[currentQuestionIndex];

        if (selected !== question.answer) {
          mistakes++;

          if (mistakes >= 2) {
            clearInterval(timerInterval);
            failLevel("MISSION FAILED");
            return;
          }

          GameManager.playSfx("wrong");
          message.textContent = trial.warning;
          return;
        }

        GameManager.playSfx("correct");
        correctAnswers++;
        currentQuestionIndex++;

        if (currentQuestionIndex >= trial.questions.length) {
          completeLevel();
        } else {
          message.textContent = "Correct. Next one...";
          setTimeout(renderQuestion, 650);
        }
      }
      function completeLevel() {
        clearInterval(timerInterval);
        answers.innerHTML = "";
        questionProgress.textContent = "Level Complete";

        const score = GameManager.completeLevel(LEVEL_NUMBER, {
          correctAnswers,
          totalQuestions: trials[selectedTheme].questions.length,
          timeRemaining: timeLeft,
          mistakes,
        });

        questionText.textContent = "Trial cleared.";
        message.textContent = `Score gained: ${score}. Returning to stages...`;

        setTimeout(() => {
          window.location.href = "MenuTest.html";
        }, 1700);
      }

      function failLevel(reason) {
        answers.innerHTML = "";
        message.textContent = reason;
        setTimeout(() => {
          GameManager.handleLevelFail(3, GameManager.t("failed"));
        }, 250);
      }

      flipBtn.addEventListener("click", flipCoin);
      coinScene.addEventListener("click", flipCoin);
      continueBtn.addEventListener("click", startQuiz);
    </script>
  </body>
</html>
