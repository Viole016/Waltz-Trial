<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Waltz's Trial - Level 4</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <script src="gameManager.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Patrick Hand", cursive;
        background: linear-gradient(135deg, #0f0f14, #1a1a24);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      body.waltz-light {
        background: #e0e5ec;
        color: #111;
      }

      .game-box {
        width: min(850px, 92%);
        padding: 35px;
        border: 2px solid #b68cff;
        border-radius: 20px;
        background: rgba(0, 0, 0, 0.35);
        box-shadow: 0 0 30px rgba(182, 140, 255, 0.35);
      }

      h1 {
        font-size: 3rem;
        color: #b68cff;
        margin-bottom: 10px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin: 25px 0;
        font-size: 1.4rem;
        color: #d7c4ff;
      }

      .riddle {
        font-size: 2rem;
        line-height: 1.3;
        margin: 35px 0 25px;
        min-height: 110px;
      }

      input {
        width: min(400px, 100%);
        padding: 12px 15px;
        font-size: 1.4rem;
        font-family: "Patrick Hand", cursive;
        text-align: center;
        border-radius: 10px;
        border: 1px solid #b68cff;
        outline: none;
      }

      button {
        margin: 10px;
        padding: 12px 24px;
        font-size: 1.3rem;
        font-family: "Patrick Hand", cursive;
        border-radius: 10px;
        border: 1px solid #b68cff;
        background: #1f1b2d;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #b68cff;
        color: #111;
      }

      .message {
        min-height: 35px;
        margin-top: 20px;
        font-size: 1.35rem;
      }

      .hint {
        color: #ffcf5a;
      }

      .success {
        color: #5fd37d;
      }

      .danger {
        color: #ff6b6b;
      }

      .back-link {
        position: fixed;
        top: 20px;
        left: 25px;
        color: #aaa;
        text-decoration: none;
        font-size: 1.4rem;
      }

      .back-link:hover {
        color: white;
      }
    </style>
  </head>

  <body>
    <a class="back-link" href="MenuTest.html" data-i18n="menu">Menu</a>

    <div class="game-box">
      <h1 data-i18n="level4Title">Level 4: Riddle Door</h1>

      <p>
        <span data-i18n="level4Intro">Answer each riddle to open the final doors. Too many wrong answers will end the trial.</span>
      </p>

      <div class="info-row">
        <span id="progressText">Riddle 1 / 4</span>
        <span id="timerText">Time: 100</span>
        <span id="mistakeText">Mistakes: 0 / 4</span>
      </div>

      <div id="riddleText" class="riddle"></div>

      <input
        id="answerInput"
        type="text"
        placeholder="Type your answer..." data-i18n-placeholder="typeAnswer"
        autocomplete="off"
      />

      <br />

      <button id="submitBtn" data-i18n="submit">Submit</button>

      <p id="message" class="message"></p>
    </div>

    <script>
      const LEVEL_NUMBER = 4;
      const START_TIME = 100;
      const MAX_MISTAKES = 4;

      const riddles = [
        {
          question:
            "I speak without a mouth and hear without ears. I come alive with the wind. What am I?",
          answers: ["echo"],
          hint: "Hint: You hear it when your voice comes back.",
        },
        {
          question:
            "The more you take, the more you leave behind. What are they?",
          answers: ["footsteps", "steps"],
          hint: "Hint: You leave these when you walk.",
        },
        {
          question:
            "I have keys but no locks. I have space but no room. What am I?",
          answers: ["keyboard", "a keyboard"],
          hint: "Hint: You use it to type.",
        },
        {
          question:
            "I am not alive, but I can die. I do not breathe, but I need air. What am I?",
          answers: ["fire", "a fire"],
          hint: "Hint: Water defeats me.",
        },
      ];

      let currentRiddle = 0;
      let mistakes = 0;
      let correctAnswers = 0;
      let timeLeft = START_TIME;
      let timer = null;
      let levelEnded = false;

      const progressText = document.getElementById("progressText");
      const timerText = document.getElementById("timerText");
      const mistakeText = document.getElementById("mistakeText");
      const riddleText = document.getElementById("riddleText");
      const answerInput = document.getElementById("answerInput");
      const submitBtn = document.getElementById("submitBtn");
      const message = document.getElementById("message");

      function startLevel() {
        showRiddle();
        startTimer();
        answerInput.focus();
      }

      function showRiddle() {
        const riddle = riddles[currentRiddle];

        progressText.textContent = `${GameManager.t("riddle")} ${currentRiddle + 1} / ${riddles.length}`;
        riddleText.textContent = riddle.question;
        answerInput.value = "";
        message.textContent = "";
        message.className = "message";
      }

      function startTimer() {
        timerText.textContent = `${GameManager.t("time")}: ${timeLeft}`;

        timer = setInterval(function () {
          timeLeft--;
          timerText.textContent = `${GameManager.t("time")}: ${timeLeft}`;

          if (timeLeft <= 0) {
            failLevel("Time is up. The doors are sealed.");
          }
        }, 1000);
      }

      function submitAnswer() {
        if (levelEnded) return;

        const playerAnswer = cleanAnswer(answerInput.value);
        const current = riddles[currentRiddle];

        if (playerAnswer === "") {
          showMessage(GameManager.t("typeFirst"), "hint");
          return;
        }

        const isCorrect = current.answers.some(function (answer) {
          return cleanAnswer(answer) === playerAnswer;
        });

        if (isCorrect) {
          correctAnswers++;
          currentRiddle++;

          if (currentRiddle >= riddles.length) {
            completeLevel();
          } else {
            GameManager.playSfx("correct");
            showMessage(GameManager.t("doorOpens"), "success");

            setTimeout(function () {
              showRiddle();
              answerInput.focus();
            }, 800);
          }
        } else {
          GameManager.playSfx("wrong");
          mistakes++;
          mistakeText.textContent = `${GameManager.t("mistakes")}: ${mistakes} / ${MAX_MISTAKES}`;

          if (mistakes >= MAX_MISTAKES) {
            failLevel("Too many wrong answers. The hall goes dark.");
          } else {
            showMessage(current.hint, "hint");
          }
        }
      }

      function completeLevel() {
        levelEnded = true;
        clearInterval(timer);

        answerInput.disabled = true;
        submitBtn.disabled = true;

        let score = 0;

        if (window.GameManager && GameManager.completeLevel) {
          score = GameManager.completeLevel(LEVEL_NUMBER, {
            correctAnswers: correctAnswers,
            totalQuestions: riddles.length,
            timeRemaining: timeLeft,
            mistakes: mistakes,
          });
        }

        riddleText.textContent = GameManager.t("finalDoor");
        GameManager.playSfx("correct");
        showMessage(`${GameManager.t("levelComplete")} ${GameManager.t("score")}: ${score}`, "success");

        setTimeout(function () {
          window.location.href = "Ending.html";
        }, 2000);
      }

      function failLevel(reason) {
        if (levelEnded) return;

        levelEnded = true;
        clearInterval(timer);

        answerInput.disabled = true;
        submitBtn.disabled = true;

        GameManager.playSfx("failed");
        showMessage(reason, "danger");

        setTimeout(function () {
          GameManager.handleLevelFail(4, GameManager.t("failed"));
        }, 500);
      }

      function cleanAnswer(text) {
        return text
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9 ]/g, "")
          .replace(/\s+/g, " ");
      }

      function showMessage(text, type) {
        message.textContent = text;
        message.className = `message ${type}`;
      }

      submitBtn.addEventListener("click", submitAnswer);

      answerInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          submitAnswer();
        }
      });

      startLevel();
    </script>
  </body>
</html>
