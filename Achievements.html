<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements - Waltz Trial</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:"Patrick Hand",cursive;color:#eee} .container{width:min(980px,92vw);padding:42px;border:2px solid rgba(255,255,255,.2);border-radius:30px;background:rgba(10,10,15,.85)} .top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px}.back{font-size:24px;text-decoration:none;color:#aaa}.back:hover{color:#fff} h1{font-size:48px;margin:0}.intro{font-size:22px;opacity:.82;margin:0 0 26px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}.achievement-card{border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:22px;background:rgba(255,255,255,.06);min-height:150px}.badge{font-size:36px;margin-bottom:10px}.achievement-card h2{font-size:28px;margin:0 0 8px}.achievement-card p{font-size:20px;line-height:1.25;margin:0;opacity:.82}.locked-card{filter:grayscale(1);opacity:.45}.earned{color:#78dd8c;font-size:18px;margin-top:12px}
  </style>
</head>
<body>
  <main class="container">
    <div class="top"><a class="back" href="Front_Page.html" data-i18n="back">← Back</a><h1 data-i18n="achievementsTitle">Achievements</h1></div>
    <p class="intro" data-i18n="achievementsIntro">Earn badges by clearing trials, avoiding mistakes and reaching the ending.</p>
    <div class="grid" id="achievementGrid"></div>
  </main>
  <script src="gameManager.js"></script>
  <script>
    function render(){ const grid=document.getElementById("achievementGrid"); grid.innerHTML=""; const icons=["🔑","🧠","⏱️","🏆","✨"]; GameManager.achievements.forEach((a,i)=>{ const earned=GameManager.hasAchievement(a.id); const card=document.createElement("section"); card.className="achievement-card"+(earned?"":" locked-card"); card.innerHTML=`<div class="badge">${earned?icons[i]:"🔒"}</div><h2>${GameManager.t(a.titleKey)}</h2><p>${GameManager.t(a.descKey)}</p>${earned?`<div class="earned">${GameManager.t("achievementUnlocked")}</div>`:""}`; grid.appendChild(card); }); }
    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>
